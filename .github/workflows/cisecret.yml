name: "Security Guard: Block secret1234"

on:
  # هذا الـ Workflow سيعمل فقط عند فتح أو تحديث أي PR
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  check-pr-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # ضروري عشان يفحص الـ commits اللي جاية في الـ PR
          fetch-depth: 0

      - name: Scan PR for secret1234
        run: |
          # نبحث عن الكلمة في كل الملفات باستثناء مجلد الـ workflows
          if grep -r "secret1234" . --exclude-dir=.github; then
            echo "::error::تم العثور على secret1234 في هذا الـ Pull Request. ممنوع الميرج!"
            exit 1
          else
            echo "فحص الأمان ناجح: لا توجد بيانات محظورة."
          fi
