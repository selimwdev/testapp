name: Secret Keyword Scanner

on: [push, pull_request]

jobs:
  check-for-forbidden-string:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secret123
        run: |
          # --exclude-dir=.github يستثني مجلد الـ workflow بالكامل من البحث
          # كده مش هيشوف الكلمة حتى لو كتبتها في ملف الـ yaml نفسه
          if grep -r "secdddret123" . --exclude-dir=.github; then
            echo "::error::تم اكتشاف كلمة محظورة (secret123) في ملفات الكود!"
            exit 1
          else
            echo "لم يتم العثور على كلمة secret123 (مع استثناء ملفات الـ workflow). الفحص ناجح."
          fi
