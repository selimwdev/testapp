name: Secret Keyword Scanner

on: [push, pull_request]

jobs:
  check-for-forbidden-string:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for secret123
        run: |
          # نبحث عن الكلمة في كل الملفات
          # -r: بحث تكراري
          # -l: يعطينا أسماء الملفات التي تحتوي على الكلمة فقط (لتقليل الضجيج في الـ Logs)
          if grep -r "secret123" .; then
            echo "::error::تم اكتشاف كلمة محظورة (secret123) في الملفات أعلاه!"
            exit 1
          else
            echo "لم يتم العثور على كلمة secret123. الفحص ناجح."
          fi
