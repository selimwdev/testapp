name: Secret Security Check

on: [push, pull_request]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Scan for emails in source code
        run: |
          # نستخدم grep للبحث عن نمط الإيميل
          # -r: بحث تكراري في المجلدات
          # -E: استخدام Regex متقدم
          # النمط [A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,} يمثل الإيميل
          
          if grep -rE "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}" .; then
            echo "::error::تم العثور على إيميلات في الكود! يرجى إزالتها."
            exit 1
          else
            echo "لم يتم العثور على إيميلات، الفحص ناجح."
          fi
