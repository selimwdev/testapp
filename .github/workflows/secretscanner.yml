name: Secret Scanner (Post-Merge)

on:
  push:
    branches:
      - prod

jobs:
  search-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Search for 'secret'
        run: |
          echo "Scanning for sensitive terms in prod branch..."
          # الأمر grep سيبحث في كل الملفات recursive
          # -r: بحث في المجلدات
          # -l: يعطي أسماء الملفات التي وجد فيها الكلمة
          # -i: تجاهل حالة الأحرف (كبير/صغير)
          if grep -ri "secret" .; then
            echo "::error::Found the word 'secret' in the code!"
            exit 1
          else
            echo "No 'secret' found. Clean!"
          fi
