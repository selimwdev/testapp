name: Validate Merge Flow

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-flow:
    runs-on: ubuntu-latest
    steps:
      - name: Enforce Branch Rules
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"
          
          echo "Source: $SOURCE_BRANCH"
          echo "Target: $TARGET_BRANCH"
          
          # 1. القاعدة الخاصة بالـ main (يستقبل فقط feature/*)
          if [[ "$TARGET_BRANCH" == "main" ]]; then
            if [[ "$SOURCE_BRANCH" != feature/* ]]; then
              echo "Error: Only 'feature/*' branches can be merged into 'main'."
              exit 1
            fi
            echo "Branch name is valid for main (Staging)."
          fi
          
          # 2. القاعدة الخاصة بالـ prod (يستقبل فقط main)
          if [[ "$TARGET_BRANCH" == "prod" ]]; then
            if [[ "$SOURCE_BRANCH" != "main" ]]; then
              echo "Error: Only 'main' can be merged into 'prod'."
              exit 1
            fi
            echo "Branch name is valid for prod."
          fi
